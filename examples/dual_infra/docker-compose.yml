services:
  api:
    image: myapi:latest
    restart: unless-stopped
    ports:
    - 8080:8080
    environment:
      DATABASE_URL: postgresql://app:s3cret!@db:5432/myapp
    healthcheck:
      test: curl -f http://localhost:8080/health
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: app
      POSTGRES_PASSWORD: s3cret!
    volumes:
    - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U app -d myapp
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  pgdata: null
