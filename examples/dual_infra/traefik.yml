entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: :443
certificatesResolvers:
  letsencrypt:
    acme:
      email: infra@example.com
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: web
log:
  level: INFO
  format: json
http:
  middlewares:
    security-headers:
      headers:
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        browserXssFilter: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin
  routers:
    api-router:
      rule: Host(`api.example.com`)
      service: api-svc
      entryPoints:
      - websecure
      middlewares:
      - security-headers
      tls:
        certResolver: letsencrypt
  services:
    api-svc:
      loadBalancer:
        passHostHeader: true
        servers:
        - url: http://api:8080
        healthCheck:
          path: /health
          interval: 10s
          timeout: 3s
