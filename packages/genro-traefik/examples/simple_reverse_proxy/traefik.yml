entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: :443
api:
  dashboard: true
  insecure: true
certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@example.com
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: web
log:
  level: INFO
  format: json
http:
  middlewares:
    auth:
      basicAuth:
        users:
        - admin:$apr1$H6uskkkW$IgXLP6ewTrSuBkTrqE8wj/
        removeHeader: true
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        browserXssFilter: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin
    rate-limit:
      rateLimit:
        average: 100
        period: 1m
        burst: 50
    secure-chain:
      chain:
        middlewares:
        - security-headers
        - rate-limit
  routers:
    api-router:
      rule: Host(`api.example.com`)
      service: api-svc
      entryPoints:
      - websecure
      middlewares:
      - secure-chain
      - auth
      tls:
        certResolver: letsencrypt
  services:
    api-svc:
      loadBalancer:
        passHostHeader: true
        servers:
        - url: http://192.168.1.10:8080
        - url: http://192.168.1.11:8080
        healthCheck:
          path: /health
          interval: 10s
          timeout: 3s
