[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "genro-juggler"
version = "0.1.0"
description = "Reactive infrastructure bus — apply genro-scriba recipes to live targets"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [
    { name = "Genropy Team", email = "info@genropy.org" }
]
keywords = [
    "genropy",
    "infrastructure",
    "kubernetes",
    "ansible",
    "reactive",
    "devops",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: System :: Systems Administration",
    "Typing :: Typed",
]
dependencies = [
    "genro-bag>=0.11.0",
    "genro-builders>=0.3.1",
    "genro-scriba>=0.1.0",
    "genro-kubernetes>=0.1.0",
    "genro-ansible>=0.1.0",
]

[project.optional-dependencies]
kubernetes = ["kubernetes>=28.0"]
ansible = ["ansible-runner>=2.3"]
http = ["starlette>=0.37", "uvicorn>=0.27"]
mcp = ["mcp>=1.0"]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pytest-sugar>=0.9",
    "mypy>=1.0",
    "ruff>=0.1.0",
]

[project.scripts]
juggler = "genro_juggler.cli:main"

[project.urls]
Homepage = "https://github.com/genropy/genro-juggler"
Repository = "https://github.com/genropy/genro-juggler"
Issues = "https://github.com/genropy/genro-juggler/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/genro_juggler"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
packages = ["genro_juggler"]
mypy_path = "src"

[[tool.mypy.overrides]]
module = [
    "genro_bag", "genro_bag.*",
    "genro_builders", "genro_builders.*",
    "genro_scriba", "genro_scriba.*",
    "genro_kubernetes", "genro_kubernetes.*",
    "genro_ansible", "genro_ansible.*",
    "kubernetes", "kubernetes.*",
    "ansible_runner", "ansible_runner.*",
    "yaml",
]
ignore_missing_imports = true

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "N", "UP", "B", "C4", "T10",
    "ISC", "PIE", "PT", "RSE", "RET", "SIM", "TCH",
    "ARG", "PL", "RUF",
]
ignore = [
    "PLR0913", "PLR2004", "PIE790", "ARG001", "ARG002",
    "PLC0415", "PLR0911", "RUF012",
]

[tool.ruff.lint.isort]
known-first-party = ["genro_juggler"]

[tool.coverage.run]
source = ["src/genro_juggler"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
